version: '3.8'

services:
  circular-fingerprint-tpot:
    build: .
    container_name: circular-fingerprint-tpot
    volumes:
      - ./data:/workspace/data:ro
      - ./results:/workspace/results
      - ./visualizations:/workspace/visualizations
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
    command: python models/train_tpot_simple.py

  # Prepare QSAR dataset for GIF generation (GPU + Full CPU cores)
  prepare-qsar-for-gif:
    build: .
    container_name: prepare-qsar-for-gif
    volumes:
      - ./data:/workspace/data
      - ./Tzu-QSAR-only:/workspace/Tzu-QSAR-only
      - ./scripts:/workspace/scripts
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
      - SLURM_CPUS_PER_TASK=24
      - OMP_NUM_THREADS=24
      - MKL_NUM_THREADS=24
      - OPENBLAS_NUM_THREADS=24
      - NUMEXPR_NUM_THREADS=24
      - CUDA_VISIBLE_DEVICES=0
    cpus: '24'
    mem_limit: 48g
    runtime: nvidia
    command: python scripts/prepare_qsar_for_gif.py
    
  # Service for running interpretations
  interpret:
    build: .
    container_name: circular-fingerprint-interpret
    volumes:
      - ./data:/workspace/data:ro
      - ./results:/workspace/results
      - ./visualizations:/workspace/visualizations
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
    command: python models/interpret_tpot.py
    depends_on:
      - circular-fingerprint-tpot
    
  # Service for parameter optimization
  optimize:
    build: .
    container_name: circular-fingerprint-optimize
    volumes:
      - ./data:/workspace/data:ro
      - ./results:/workspace/results
      - ./visualizations:/workspace/visualizations
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
    command: python models/agentic_parameter_optimizer.py
    
  # Service for generating GIFs (original LIME/mixed) - GPU accelerated
  visualize:
    build: .
    container_name: circular-fingerprint-visualize
    volumes:
      - ./data:/workspace/data:ro
      - ./results:/workspace/results:ro
      - ./visualization:/workspace/visualization
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
      - OMP_NUM_THREADS=24
      - CUDA_VISIBLE_DEVICES=0
    cpus: '24'
    mem_limit: 48g
    runtime: nvidia
    command: python visualization/generate_gifs.py
    depends_on:
      - optimize

  # Service for generating SHAP-based GIFs (dataset SHAP, LIME highlighting)
  visualize-shap:
    build: .
    container_name: circular-fingerprint-visualize-shap
    volumes:
      - ./data:/workspace/data:ro
      - ./results:/workspace/results:ro
      - ./visualization:/workspace/visualization
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
    command: python visualization/generate_gifs_shap.py
    depends_on:
      - optimize

  # Service for generating SHAP-local highlighting GIF (pure SHAP local)
  visualize-shap-local:
    build: .
    container_name: circular-fingerprint-visualize-shap-local
    volumes:
      - ./data:/workspace/data:ro
      - ./results:/workspace/results:ro
      - ./visualization:/workspace/visualization
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
    command: python visualization/generate_gifs_shap_local.py
    depends_on:
      - optimize

  # Service for generating LIME+SHAP ensemble GIF
  visualize-shap-ensemble:
    build: .
    container_name: circular-fingerprint-visualize-shap-ensemble
    volumes:
      - ./data:/workspace/data:ro
      - ./results:/workspace/results:ro
      - ./visualization:/workspace/visualization
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
      - ENSEMBLE_ALPHA=0.5
    command: python visualization/generate_gifs_shap_ensemble.py
    depends_on:
      - optimize

  # SAR analysis service (persists outputs to host)
  sar:
    build: .
    container_name: circular-fingerprint-sar
    volumes:
      - ./data:/workspace/data:ro
      - ./analysis/sar:/workspace/analysis/sar
      - ./visualization:/workspace/visualization:ro
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
    command: python analysis/sar/sar_analysis.py

  # Sweep analysis across GIF parameters and interpretation types
  gif-sweep:
    build: .
    container_name: circular-fingerprint-gif-sweep
    volumes:
      - ./data:/workspace/data:ro
      - ./analysis/sar:/workspace/analysis/sar
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
      - MAX_ITERS=24
      - N_PER_CLASS=50
      - ENSEMBLE_ALPHA=0.5
      - TOPK_ATOMS=8
    command: python analysis/sar/gif_sweep_analysis.py

  # Fast sweep service for parameter + interpretation selection
  sar-fast-sweep:
    build: .
    container_name: circular-fingerprint-sar-fast
    volumes:
      - ./data:/workspace/data:ro
      - ./analysis/sar:/workspace/analysis/sar
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
      - N_PER_CLASS=30
      - MAX_WORKERS=4
      - STAGE2_TOPK_CONFIGS=8
      - STAGE2_TEST_SUBSET=80
      - ENSEMBLE_ALPHA=0.5
      - LAMBDA_COLLISION=0.2
    command: python analysis/sar/fast_sweep.py

  # Scaffold split evaluation service
  sar-scaffold-split:
    build: .
    container_name: circular-fingerprint-sar-scaffold
    volumes:
      - ./data:/workspace/data:ro
      - ./analysis/sar:/workspace/analysis/sar
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
      - NBITS=8192
      - RADIUS=1
      - USEFEATURES=0
      - USECHIRALITY=1
      - N_PER_CLASS=60
      - TEST_FRAC=0.2
      - ENSEMBLE_ALPHA=0.5
      - TOPK_BITS=32
      - N_BOOTSTRAP=5
      - EXPLAIN_SUBSET=100
      - REPEATS=10
      - BASE_SEED=123
    command: python analysis/sar/scaffold_split_eval.py

  # MMP & Motif enrichment analysis
  sar-mmp-motif:
    build: .
    container_name: circular-fingerprint-sar-mmp
    volumes:
      - ./data:/workspace/data:ro
      - ./analysis/sar:/workspace/analysis/sar
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
      - NBITS=8192
      - RADIUS=1
      - USEFEATURES=0
      - USECHIRALITY=1
      - N_PER_CLASS=60
      - EXPLAIN_SUBSET=120
      - TOPK_ATOMS=12
      - ENSEMBLE_ALPHA=0.5
      - MAX_MMP_PAIRS=200
      - MCS_TIMEOUT=2
    command: python analysis/sar/mmp_motif_analysis.py

  # QSAR Analysis - Data Loading and IC50 Analysis
  qsar-analysis:
    build: .
    container_name: qsar-analysis
    volumes:
      - ./Tzu-QSAR-only:/workspace/Tzu-QSAR-only
      - ./Tzu-QSAR-only/data:/workspace/data:ro
      - ./Tzu-QSAR-only/results:/workspace/results
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
      - PYTHONPATH=/workspace/Tzu-QSAR-only:/workspace
    command: python scripts/analyze_qsar_ic50.py

  # QSAR Model Training Service
  qsar-train:
    build: .
    container_name: qsar-train
    volumes:
      - ./Tzu-QSAR-only:/workspace/Tzu-QSAR-only
      - ./Tzu-QSAR-only/data:/workspace/data
      - ./Tzu-QSAR-only/results:/workspace/results
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
      - PYTHONPATH=/workspace/Tzu-QSAR-only:/workspace
    command: python Tzu-QSAR-only/scripts/run_qsar_pipeline.py
    depends_on:
      - qsar-analysis

  # QSAR Descriptor Computation
  qsar-descriptors:
    build: .
    container_name: qsar-descriptors
    volumes:
      - ./Tzu-QSAR-only:/workspace/Tzu-QSAR-only
      - ./Tzu-QSAR-only/data:/workspace/data
      - ./Tzu-QSAR-only/results:/workspace/results
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
      - PYTHONPATH=/workspace/Tzu-QSAR-only:/workspace
    command: python -c "print('QSAR Descriptor computation ready')"

  # QSAR Visualization Service
  qsar-visualize:
    build: .
    container_name: qsar-visualize
    volumes:
      - ./Tzu-QSAR-only:/workspace/Tzu-QSAR-only
      - ./Tzu-QSAR-only/data:/workspace/data:ro
      - ./Tzu-QSAR-only/results:/workspace/results
    environment:
      - PYTHONUNBUFFERED=1
      - MPLBACKEND=Agg
      - PYTHONPATH=/workspace/Tzu-QSAR-only:/workspace
    command: python -c "print('QSAR Visualization ready')"
    depends_on:
      - qsar-analysis
